<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Upload Github User Content</title>
    </head>

    <body>
        <h1>Upload GitHub User Content</h1>

        <table id="table">
            <tr>
                <td>Orgnization</td>
                <td><input type="text" id="orgnization" value="Topsens"/></td>
            </tr>
            <tr>
                <td>Repository</td>
                <td><input type="text" id="repository" value="deps"/></td>
            </tr>
            <tr>
                <td>Branch</td>
                <td><input type="text" id="branch" value="master"/></td>
            </tr>
            <tr>
                <td>Path</td>
                <td><input type="text" id="path" placeholder="<remote path>"/></td>
            </tr>
            <tr>
                <td>Token</td>
                <td><input type="text" id="token" placeholder="<user token>"/></td>
            </tr>
            <tr>
                <td>Message</td>
                <td><input type="text" id="message" placeholder="<commit message>"></td>
            </tr>
            <tr>
                <td>Local File</td>
                <td><input type="text" id="file" placeholder="<select file>"/></td>
                <td><button onclick="onBrowse()">...</button></td>
            </tr>
        </table>

        <br/>
        <button onclick="upload()">Upload</button>

        <div style="margin-top:8px;">Progress:</div>
        <div id="log" style="width:100%;height:50px;overflow-y:auto;background:#1e1e1e;color:#dcdcdc;
        font-family:Consolas,monospace;font-size:13px;padding:8px;white-space:pre-wrap;border:1pxsolid#333;"></div>

        <div style="margin-top:8px;">Result:</div>
        <div id="result" style="width:100%;height:300px;overflow-y:auto;background:#1e1e1e;color:#dcdcdc;
        font-family:Consolas,monospace;font-size:13px;padding:8px;white-space:pre-wrap;border:1pxsolid#333;"></div>

        <script>
            ${script}
        </script>
    </body>
</html>
